name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # RUST CHECKS
  # ═══════════════════════════════════════════════════════════════════════════
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: medbrains
          POSTGRES_PASSWORD: medbrains
          POSTGRES_DB: medbrains_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run tests
        env:
          DATABASE_URL: postgres://medbrains:medbrains@localhost:5432/medbrains_test
        run: cargo test --all-features

  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    needs: [rust-fmt, rust-clippy]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

  # ═══════════════════════════════════════════════════════════════════════════
  # TYPESCRIPT CHECKS
  # ═══════════════════════════════════════════════════════════════════════════
  typescript-lint:
    name: TypeScript Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome check
        run: pnpm run lint

  typescript-typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm run typecheck

  typescript-test:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

  typescript-build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    needs: [typescript-lint, typescript-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # E2E TESTS (on PR only, after builds pass)
  # ═══════════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [typescript-build, rust-build]
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: medbrains
          POSTGRES_PASSWORD: medbrains
          POSTGRES_DB: medbrains_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Run E2E tests
        run: pnpm --filter @medbrains/web run test:e2e
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # DOCKER BUILD
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust-build, typescript-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: medbrains:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════
  # AUDIT / RLS / TENANT-LEAK / SHARING / TRACING STATIC CHECKS
  # (RFC-INFRA-2026-002 Phase 0 — required status check on main)
  # ═══════════════════════════════════════════════════════════════════════════
  audit-checks:
    name: Audit Checks (RLS / Tenant-Leak / Sharing / Audit / Tracing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Strict from day 0:
      - name: Run check-migration-headers (STRICT — enforced for migrations >=124)
        run: python3 scripts/migration_header_lint.py

      # STRICT — all tenant-bearing tables must have RLS coverage.
      # Closed in migrations 124 (helpers) + 125 (8-table coverage).
      - name: Run check-rls (STRICT)
        run: python3 scripts/check_rls.py

      # STRICT — ratchets against scripts/.tenant_leak_baseline.json.
      # 643 routes/* call sites locked at baseline. New raw SQL in routes
      # fails CI. Use `make check-tenant-leak-update-baseline` after a
      # cleanup PR to ratchet the baseline down.
      - name: Run check-tenant-leak (STRICT — ratchet)
        run: python3 scripts/check_tenant_leak.py

      # Soft until Phase 3 (sharing module lands):
      - name: Run check-sharing
        run: python3 scripts/check_sharing.py

      # Soft until Phase 2 (AuditLayer middleware lands):
      - name: Run check-audit
        run: python3 scripts/check_audit_coverage.py

      # Informational until tracing instrumentation reaches 90% (set in Phase 2):
      - name: Run check-tracing-spans
        run: python3 scripts/check_tracing_spans.py
        continue-on-error: true

      # Sprint A enterprise overlay — strict from day 0, all run on every PR
      - name: Run check-region-pinning (DPDP residency)
        run: python3 scripts/check_region_pinning.py

      - name: Run check-no-card-logging (PCI scope reduction)
        run: python3 scripts/check_no_card_logging.py

      # Soft until infra/cilium/egress-allowlist.yaml lands (Phase 4):
      - name: Run check-egress-allowlist
        run: python3 scripts/check_egress_allowlist.py

  # ═══════════════════════════════════════════════════════════════════════════
  # FINAL STATUS CHECK (required for branch protection)
  # ═══════════════════════════════════════════════════════════════════════════
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - rust-fmt
      - rust-clippy
      - rust-test
      - rust-build
      - typescript-lint
      - typescript-typecheck
      - typescript-test
      - typescript-build
      - audit-checks
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.rust-fmt.result }}" != "success" ]] || \
             [[ "${{ needs.rust-clippy.result }}" != "success" ]] || \
             [[ "${{ needs.rust-test.result }}" != "success" ]] || \
             [[ "${{ needs.rust-build.result }}" != "success" ]] || \
             [[ "${{ needs.typescript-lint.result }}" != "success" ]] || \
             [[ "${{ needs.typescript-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.typescript-test.result }}" != "success" ]] || \
             [[ "${{ needs.typescript-build.result }}" != "success" ]] || \
             [[ "${{ needs.audit-checks.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"

# MedBrains Proxy — Pingora with SNI multi-cert
# Each route can have its own cert_path/key_path for proper SNI

http_port = 80
https_port = 443

[[routes]]
domain = "medbrains.alagappahospital.com"
upstream = "127.0.0.1:3000"
cert_path = "/etc/letsencrypt/live/medbrains.alagappahospital.com/fullchain.pem"
key_path = "/etc/letsencrypt/live/medbrains.alagappahospital.com/privkey.pem"

[[routes]]
domain = "email.alagappa.org"
upstream = "127.0.0.1:8080"
cert_path = "/etc/letsencrypt/live/email.alagappa.org/fullchain.pem"
key_path = "/etc/letsencrypt/live/email.alagappa.org/privkey.pem"

[[routes]]
domain = "autodiscover.email.alagappa.org"
upstream = "127.0.0.1:8080"

[[routes]]
domain = "charts.alagappa.org"
upstream = "127.0.0.1:8088"

[[routes]]
domain = "wiki.alagappa.org"
upstream = "127.0.0.1:3333"

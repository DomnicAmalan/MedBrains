services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: medbrains
      POSTGRES_USER: medbrains
      POSTGRES_PASSWORD: medbrains_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medbrains"]
      interval: 5s
      timeout: 5s
      retries: 5

  yottadb:
    image: yottadb/yottadb-debian:latest-master
    ports:
      - "9080:9080"
    environment:
      ydb_dist: /opt/yottadb/current
      ydb_gbldir: /data/yottadb.gld
      ydb_routines: "/data/o(/data/r) /opt/yottadb/current/libyottadbutil.so"
    volumes:
      - yottadata:/data
    command: >
      bash -c "
        source /opt/yottadb/current/ydb_env_set &&
        /opt/yottadb/current/ydb -run '^%XCMD' 'do start^%%YDBWEB(9080)' &
        tail -f /dev/null
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kiwi TCMS (Test Case Management) ──
  kiwi_db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: kiwi
      MYSQL_DATABASE: kiwi
      MYSQL_USER: kiwi
      MYSQL_PASSWORD: kiwi
    volumes:
      - kiwi_dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  kiwi:
    image: kiwitcms/kiwi:latest
    ports:
      - "9443:8443"
    environment:
      KIWI_DB_HOST: kiwi_db
      KIWI_DB_PORT: "3306"
      KIWI_DB_NAME: kiwi
      KIWI_DB_USER: kiwi
      KIWI_DB_PASSWORD: kiwi
    depends_on:
      kiwi_db:
        condition: service_healthy
    volumes:
      - kiwi_uploads:/Kiwi/uploads

  # ── SpiceDB (ReBAC permissions service, Apache 2.0) ──
  spicedb_pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spicedb
      POSTGRES_PASSWORD: spicedb_dev
      POSTGRES_DB: spicedb
    volumes:
      - spicedb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spicedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  spicedb_migrate:
    image: authzed/spicedb:v1.39.1
    command: >
      datastore migrate head
      --datastore-engine=postgres
      --datastore-conn-uri=postgres://spicedb:spicedb_dev@spicedb_pg:5432/spicedb?sslmode=disable
    depends_on:
      spicedb_pg:
        condition: service_healthy
    restart: "no"

  spicedb:
    image: authzed/spicedb:v1.39.1
    command: >
      serve
      --grpc-preshared-key=devsecret
      --datastore-engine=postgres
      --datastore-conn-uri=postgres://spicedb:spicedb_dev@spicedb_pg:5432/spicedb?sslmode=disable
      --metrics-addr=0.0.0.0:9090
    ports:
      - "50051:50051"   # gRPC
      - "8453:8443"     # HTTP gateway (8443 conflicts with another local service)
      - "9091:9090"     # Prometheus metrics
    depends_on:
      spicedb_pg:
        condition: service_healthy
      spicedb_migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  yottadata:
  kiwi_dbdata:
  kiwi_uploads:
  spicedb_pgdata:

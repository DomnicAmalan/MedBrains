services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: medbrains
      POSTGRES_USER: medbrains
      POSTGRES_PASSWORD: medbrains_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-kiwi-db.sh:/docker-entrypoint-initdb.d/init-kiwi-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medbrains"]
      interval: 5s
      timeout: 5s
      retries: 5

  yottadb:
    image: yottadb/yottadb-debian:latest-master
    ports:
      - "9080:9080"
    environment:
      ydb_dist: /opt/yottadb/current
      ydb_gbldir: /data/yottadb.gld
      ydb_routines: "/data/o(/data/r) /opt/yottadb/current/libyottadbutil.so"
    volumes:
      - yottadata:/data
    command: >
      bash -c "
        source /opt/yottadb/current/ydb_env_set &&
        /opt/yottadb/current/ydb -run '^%XCMD' 'do start^%%YDBWEB(9080)' &
        tail -f /dev/null
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kiwi TCMS (Test Case Management) ──
  kiwi:
    image: kiwitcms/kiwi:latest
    ports:
      - "8443:8443"
    environment:
      KIWI_DB_ENGINE: django.db.backends.postgresql
      KIWI_DB_HOST: postgres
      KIWI_DB_PORT: "5432"
      KIWI_DB_NAME: kiwi
      KIWI_DB_USER: medbrains
      KIWI_DB_PASSWORD: medbrains_dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - kiwi_uploads:/Kiwi/uploads

volumes:
  pgdata:
  yottadata:
  kiwi_uploads:

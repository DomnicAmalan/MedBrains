services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: medbrains
      POSTGRES_USER: medbrains
      POSTGRES_PASSWORD: medbrains_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medbrains"]
      interval: 5s
      timeout: 5s
      retries: 5

  yottadb:
    image: yottadb/yottadb-debian:latest-master
    ports:
      - "9080:9080"
    environment:
      ydb_dist: /opt/yottadb/current
      ydb_gbldir: /data/yottadb.gld
      ydb_routines: "/data/o(/data/r) /opt/yottadb/current/libyottadbutil.so"
    volumes:
      - yottadata:/data
    command: >
      bash -c "
        source /opt/yottadb/current/ydb_env_set &&
        /opt/yottadb/current/ydb -run '^%XCMD' 'do start^%%YDBWEB(9080)' &
        tail -f /dev/null
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  yottadata:

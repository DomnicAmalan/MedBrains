---
# K3s server (control-plane) install — bare-metal Debian 12 / Ubuntu 24.04.
- hosts: server
  gather_facts: yes
  vars:
    cluster_id: "{{ cluster_id }}"
    k3s_version: "{{ k3s_version }}"
    k3s_token: "{{ k3s_token }}"
    headscale_login_server: "{{ headscale_login_server }}"

  tasks:
    - name: Install prerequisites
      apt:
        name:
          - curl
          - apparmor
          - apparmor-utils
          - iptables
          - ca-certificates
          - jq
        update_cache: yes
        state: present

    - name: Render /etc/rancher/k3s/config.yaml
      copy:
        dest: /etc/rancher/k3s/config.yaml
        mode: '0644'
        content: |
          cluster-init: true
          token: {{ k3s_token }}
          write-kubeconfig-mode: "0644"
          tls-san:
            - {{ cluster_id }}.medbrains.internal
          disable:
            - traefik
          kube-controller-manager-arg:
            - "node-monitor-period=20s"
            - "node-monitor-grace-period=40s"
      register: cfg

    - name: Render /etc/medbrains/cluster-meta
      copy:
        dest: /etc/medbrains/cluster-meta
        mode: '0644'
        content: |
          cluster_id={{ cluster_id }}
          headscale_login={{ headscale_login_server }}
          role=server

    - name: Install K3s
      shell: |
        curl -fsSL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure k3s is running
      systemd:
        name: k3s
        state: started
        enabled: yes

    - name: Wait for kubeconfig file
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        state: present
        timeout: 60

    - name: Wait for API healthcheck
      shell: kubectl --kubeconfig=/etc/rancher/k3s/k3s.yaml get nodes
      retries: 12
      delay: 5
      register: kc
      until: kc.rc == 0

module: auth
description: Authentication, session management, CSRF, permissions
tests:
  - id: AUTH-001
    summary: Login with valid credentials
    layer: api
    priority: P0
    automated: true
    test_file: "crates/medbrains-server/tests/auth_test.rs::test_login_valid"
    steps:
      - POST /api/auth/login with admin/admin123
      - Assert 200
      - Assert body.user.role = super_admin
      - Assert Set-Cookie headers contain access_token + refresh_token + csrf

  - id: AUTH-002
    summary: Login with wrong password
    layer: api
    priority: P0
    automated: true
    test_file: "crates/medbrains-server/tests/auth_test.rs::test_login_invalid"
    steps:
      - POST /api/auth/login with admin/wrong_password
      - Assert 401 unauthorized

  - id: AUTH-003
    summary: Login with nonexistent user
    layer: api
    priority: P0
    automated: true
    test_file: "crates/medbrains-server/tests/auth_test.rs::test_login_no_user"
    steps:
      - POST /api/auth/login with noone/password
      - Assert 401 unauthorized

  - id: AUTH-004
    summary: Access protected endpoint without auth
    layer: api
    priority: P0
    automated: true
    test_file: "crates/medbrains-server/tests/auth_test.rs::test_protected_no_auth"
    steps:
      - GET /api/patients without cookies
      - Assert 401

  - id: AUTH-005
    summary: /me returns current user info
    layer: api
    priority: P0
    automated: true
    test_file: "crates/medbrains-server/tests/auth_test.rs::test_me_endpoint"
    steps:
      - Login as admin
      - GET /api/auth/me with cookies
      - Assert 200, body contains user info + permissions

  - id: AUTH-006
    summary: Login page renders split-screen
    layer: e2e
    priority: P0
    automated: true
    test_file: "apps/web/e2e/scenarios/auth.spec.ts::login page renders"
    steps:
      - Navigate to /login
      - Assert manifesto panel visible (desktop)
      - Assert form with username/password fields
      - Assert dev credentials toggle

  - id: AUTH-007
    summary: Login flow end-to-end
    layer: e2e
    priority: P0
    automated: true
    test_file: "apps/web/e2e/scenarios/auth.spec.ts::login and redirect"
    steps:
      - Navigate to /login
      - Fill username=admin, password=admin123
      - Click Sign In
      - Assert redirect to /dashboard

  - id: AUTH-008
    summary: CSRF token required on mutations
    layer: api
    priority: P1
    automated: false
    steps:
      - Login to get cookies
      - POST /api/patients without x-csrf-token header
      - Assert 403 CSRF error

  - id: AUTH-009
    summary: Refresh token rotation
    layer: api
    priority: P1
    automated: false
    steps:
      - Login to get refresh token
      - POST /api/auth/refresh with refresh token
      - Assert new access + refresh tokens issued
      - Assert old refresh token revoked

  - id: AUTH-010
    summary: Concurrent session limit (max 5)
    layer: api
    priority: P2
    automated: false
    steps:
      - Login 6 times from different sessions
      - Assert oldest session revoked

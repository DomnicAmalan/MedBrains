module: Device Integration
plan: Device Integration
category: Devices
cases:
  - summary: List adapter catalog returns seeded devices
    priority: High
    automated: true
    steps:
      - action: GET /api/devices/catalog
        expected: 200, array contains roche_cobas_6000, sysmex_xn1000

  - summary: Search adapter catalog by manufacturer
    priority: Medium
    automated: true
    steps:
      - action: GET /api/devices/catalog?q=roche
        expected: All results have manufacturer_code=roche

  - summary: Filter catalog by category
    priority: Medium
    automated: false
    steps:
      - action: GET /api/devices/catalog?category=lab_hematology
        expected: All results have device_category=lab_hematology

  - summary: Preview AI auto-config for known adapter
    priority: High
    automated: true
    steps:
      - action: GET /api/devices/catalog/roche_cobas_6000/preview-config
        expected: confidence > 0.9, field_mappings not empty, default_port=2575

  - summary: Create device instance with AI auto-config
    priority: High
    automated: true
    steps:
      - action: POST /api/devices/instances with adapter_code=roche_cobas_6000
        expected: 200, ai_confidence > 0, config_source=ai_auto

  - summary: List device instances
    priority: High
    automated: false
    steps:
      - action: GET /api/devices/instances
        expected: 200, array of device instances

  - summary: Update device hostname and port
    priority: Medium
    automated: false
    steps:
      - action: PUT /api/devices/instances/{id} with hostname + port
        expected: Updated values persisted

  - summary: Decommission device
    priority: Medium
    automated: false
    steps:
      - action: DELETE /api/devices/instances/{id}
        expected: status=decommissioned, is_active=false

  - summary: Device data ingest stores message
    priority: High
    automated: true
    steps:
      - action: POST /api/device-ingest/lab with simulated HL7 data
        expected: Message stored in device_messages, device message_count incremented

  - summary: Device data ingest routes to lab_results
    priority: High
    automated: false
    preconditions: Lab order with matching sample_barcode exists
    steps:
      - action: POST /api/device-ingest/lab with matching barcode
        expected: lab_result created, order status=processing

  - summary: Create routing rule
    priority: Medium
    automated: false
    steps:
      - action: POST /api/devices/routing-rules with target_module=lab
        expected: Rule created, visible in list

  - summary: Add Device wizard UI flow
    priority: High
    automated: false
    steps:
      - action: Navigate to /admin/devices, click Add Device
        expected: Wizard opens with adapter search
      - action: Select roche_cobas_6000
        expected: AI config preview with confidence badge
      - action: Fill hostname=192.168.1.100, port=2575
        expected: Fields accept input
      - action: Click Save
        expected: Device appears in Connected Devices list

module: Patients
plan: Patient Management
category: Clinical
cases:
  - summary: Register new patient with full demographics
    priority: High
    automated: true
    steps:
      - action: POST /api/patients with full demographic data
        expected: 201, UHID generated

  - summary: Search patients by name
    priority: High
    automated: true
    steps:
      - action: GET /api/patients?search=Kumar
        expected: Matching patients returned

  - summary: Get patient by ID
    priority: High
    automated: false
    steps:
      - action: GET /api/patients/{id}
        expected: 200 with full patient record

  - summary: Update patient demographics
    priority: Medium
    automated: false
    steps:
      - action: PUT /api/patients/{id} with updated phone/address
        expected: Changes persisted

  - summary: Patient list pagination
    priority: Medium
    automated: false
    steps:
      - action: GET /api/patients?page=1&per_page=10
        expected: Max 10 results, meta.total_count present

  - summary: Duplicate UHID prevention
    priority: High
    automated: false
    steps:
      - action: Register two patients
        expected: Different UHIDs assigned

  - summary: Patient registration form UI
    priority: High
    automated: true
    steps:
      - action: Navigate to /patients, click Register Patient
        expected: Registration form opens
      - action: Fill required fields, submit
        expected: Success notification, patient in list

  - summary: Patient search in table
    priority: Medium
    automated: false
    steps:
      - action: Navigate to /patients, type in search box
        expected: Table filters in real-time

  - summary: Patient list under load
    priority: Low
    automated: true
    notes: Load test with 100 concurrent users
    steps:
      - action: 100 concurrent users querying /api/patients
        expected: p95 < 500ms, zero 500 errors
